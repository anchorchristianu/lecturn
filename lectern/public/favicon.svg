<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#2f4c40"/>
  <!-- serif "L", drawn as shapes so it renders without any font -->
  <g fill="#f4efe3">
    <rect x="16" y="15" width="20" height="5" rx="1.5"/>   <!-- top serif cap -->
    <rect x="22" y="15" width="8"  height="29"/>            <!-- stem -->
    <rect x="22" y="39" width="27" height="5"/>             <!-- foot -->
    <rect x="44" y="36" width="5"  height="11" rx="1.5"/>   <!-- foot serif lip -->
  </g>
  <rect x="15" y="50" width="34" height="2.5" rx="1.25" fill="#c9a96a"/> <!-- brass ledge -->
</svg>
